
<style>
  .demo-section {
    position: relative;
    border-radius: 16px;
    overflow: hidden;
    margin-bottom: 16px;
    min-height: 180px;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-direction: column;
  }
  .blob-canvas {
    position: absolute;
    inset: 0;
    width: 100%;
    height: 100%;
  }
  .section-label {
    position: relative;
    z-index: 2;
    color: rgba(255,255,255,0.9);
    font-size: 13px;
    font-weight: 500;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    margin-bottom: 6px;
  }
  .section-title {
    position: relative;
    z-index: 2;
    color: #fff;
    font-size: 28px;
    font-weight: 700;
    font-family: 'Chakra Petch', sans-serif;
  }
  .ctrl { display:flex; gap:12px; align-items:center; margin-bottom:12px; flex-wrap:wrap; }
  .ctrl label { font-size:13px; color: var(--text-secondary); }
  .tag { font-size:11px; background: rgba(255,255,255,0.18); color:#fff; padding:3px 10px; border-radius:20px; position:relative; z-index:2; margin-top:8px; }
</style>

<div class="ctrl">
  <label>Speed</label>
  <input type="range" min="0.2" max="3" step="0.1" value="1" id="speed" style="width:120px">
  <label>Blur</label>
  <input type="range" min="20" max="120" step="5" value="60" id="blur" style="width:100px">
  <label>Blobs</label>
  <input type="range" min="3" max="8" step="1" value="5" id="count" style="width:80px">
</div>

<div class="demo-section" id="hero-demo" style="background:#060b18;">
  <canvas class="blob-canvas" id="c1"></canvas>
  <div class="section-label">Hero Section</div>
  <div class="section-title">ปลากัด<span style="color:#00c8f0"> สวยงาม</span></div>
  <div class="tag">Fluid Blob Background</div>
</div>

<div class="demo-section" id="ws-demo" style="background:#0a0a1a;">
  <canvas class="blob-canvas" id="c2"></canvas>
  <div class="section-label">Wholesale Section</div>
  <div class="section-title" style="color:#fff">ขายส่ง<span style="color:#e8334a"> ราคาพิเศษ</span></div>
  <div class="tag">Fluid Blob Background</div>
</div>

<script>
const speedEl = document.getElementById('speed');
const blurEl = document.getElementById('blur');
const countEl = document.getElementById('count');

class BlobScene {
  constructor(canvasId, palette, bgColor) {
    this.canvas = document.getElementById(canvasId);
    this.ctx = this.canvas.getContext('2d');
    this.palette = palette;
    this.bgColor = bgColor;
    this.blobs = [];
    this.speedMult = 1;
    this.blurAmt = 60;
    this.blobCount = 5;
    this.raf = null;
    this.resize();
    this.initBlobs();
    this.loop();
  }

  resize() {
    const rect = this.canvas.parentElement.getBoundingClientRect();
    this.W = rect.width || 600;
    this.H = rect.height || 180;
    this.canvas.width = this.W;
    this.canvas.height = this.H;
  }

  initBlobs() {
    this.blobs = [];
    for (let i = 0; i < this.blobCount; i++) {
      this.blobs.push({
        x: Math.random() * this.W,
        y: Math.random() * this.H,
        r: 60 + Math.random() * 100,
        vx: (Math.random() - 0.5) * 0.4,
        vy: (Math.random() - 0.5) * 0.4,
        color: this.palette[i % this.palette.length],
        phase: Math.random() * Math.PI * 2,
        phaseSpeed: 0.003 + Math.random() * 0.004,
      });
    }
  }

  loop() {
    this.ctx.clearRect(0, 0, this.W, this.H);
    this.ctx.filter = `blur(${this.blurAmt}px)`;

    for (const b of this.blobs) {
      b.phase += b.phaseSpeed * this.speedMult;
      b.x += b.vx * this.speedMult + Math.sin(b.phase * 1.3) * 0.3;
      b.y += b.vy * this.speedMult + Math.cos(b.phase) * 0.3;

      if (b.x < -b.r) b.x = this.W + b.r;
      if (b.x > this.W + b.r) b.x = -b.r;
      if (b.y < -b.r) b.y = this.H + b.r;
      if (b.y > this.H + b.r) b.y = -b.r;

      const g = this.ctx.createRadialGradient(b.x, b.y, 0, b.x, b.y, b.r + 20);
      g.addColorStop(0, b.color.replace('A', '0.55)').replace('rgb', 'rgba').replace(')', ',0.55)'));
      g.addColorStop(1, 'transparent');

      this.ctx.beginPath();
      this.ctx.arc(b.x, b.y, b.r, 0, Math.PI * 2);
      this.ctx.fillStyle = b.color;
      this.ctx.fill();
    }

    this.ctx.filter = 'none';
    this.raf = requestAnimationFrame(() => this.loop());
  }

  update(speedMult, blurAmt, blobCount) {
    this.speedMult = speedMult;
    this.blurAmt = blurAmt;
    if (blobCount !== this.blobCount) {
      this.blobCount = blobCount;
      this.initBlobs();
    }
  }
}

const scenes = [
  new BlobScene('c1',
    ['rgba(0,200,240,0.5)', 'rgba(100,60,220,0.45)', 'rgba(0,150,255,0.4)', 'rgba(40,220,180,0.35)', 'rgba(180,60,240,0.35)'],
    '#060b18'
  ),
  new BlobScene('c2',
    ['rgba(232,51,74,0.5)', 'rgba(220,80,30,0.4)', 'rgba(180,30,120,0.4)', 'rgba(240,120,0,0.35)', 'rgba(100,20,180,0.35)'],
    '#0a0a1a'
  ),
];

function syncAll() {
  const s = parseFloat(speedEl.value);
  const b = parseFloat(blurEl.value);
  const n = parseInt(countEl.value);
  scenes.forEach(sc => sc.update(s, b, n));
}

speedEl.addEventListener('input', syncAll);
blurEl.addEventListener('input', syncAll);
countEl.addEventListener('input', syncAll);

window.addEventListener('resize', () => scenes.forEach(sc => { sc.resize(); sc.initBlobs(); }));
</script>
